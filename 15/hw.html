<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/hw.css">
</head>
<body>
    <div class="buttons">

        <button class="btn fill">Fill In</button>
        <button class="btn glow">Glowing</button>
        <button class="btn fill-up">Fill Up</button>
        <button class="btn slide">Slide</button>
        <button class="btn raise">Raise</button>
        <button class="btn close">Close</button>
        <button class="btn notify">
            <div class="scroll">
                <span>Thanks</span>
                <span>Notify Me</span>
            </div>
        </button>
        <button class="btn hover-me">
            <span>Hove</span>r Me
        </button>
        <button class="btn zoom">Zoom</button>
        <button class="btn offset">Offset</button>
        <div class="explore-wrapper">
            <button class="btn explore">
                <span>
                Explore More
                </span>
                <span class="arrow">
                    <i class="fa-solid fa-arrow-right-long"></i>
                </span>
            </button> 
        </div>
        <button class="btn fancy">Fancy Button</button>
        <button class="btn hover">
            Hover Me
        </button>
        <button class="btn turn">
            <span class="part green"></span>
            <span class="part blue"></span>
            <span class="text">Explore More</span>
        </button>
    </div>
</body>
</html>
